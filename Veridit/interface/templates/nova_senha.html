{% extends "base.html" %}
{% block main_layout %}
<div class="split-container">
    <div class="split-left">
        <h1>Veridit</h1>
        <p>Plataforma de Preservação e Coleta de Provas Digitais.</p>
    </div>
    
    <div class="split-right">
        <div class="auth-card">
            <h2>Nova Senha</h2>
            <p class="auth-subtitle">Crie sua nova senha de acesso.</p>
            
            <form action="/confirmar-mudanca" method="post">
                <input type="hidden" name="token" value="{{ token }}">
                
                <div class="form-group">
                    <label class="form-label">Nova Senha</label>
                    <input type="password" name="nova_senha" class="form-input" placeholder="••••••" required>
                </div>

                <button type="submit" class="btn-primary">Atualizar Senha</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
