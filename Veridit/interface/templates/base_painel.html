<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veridit - RISE Labs</title>
    <style>
        /* O SEU CSS INTACTO */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; background-color: #F8F7F4; min-height: 100vh; }
        
        .sidebar { width: 260px; background-color: #1A233A; color: white; display: flex; flex-direction: column; justify-content: space-between; padding: 30px 20px; z-index: 10; }
        .logo-area h1 { color: #F2C94C; font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .logo-area span { color: #828282; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        .user-card { background-color: #242F4D; padding: 15px; border-radius: 8px; margin-top: 30px; }
        .user-name { font-size: 14px; font-weight: 600; }
        .user-email { font-size: 11px; color: #A4B3CD; margin-bottom: 10px; word-break: break-all; }
        .user-credits { font-size: 12px; color: #F2C94C; font-weight: bold; }
        
        .menu-list { list-style: none; margin-top: 40px; flex-grow: 1; }
        .menu-item a { display: block; padding: 12px 15px; color: #A4B3CD; text-decoration: none; border-radius: 6px; margin-bottom: 8px; font-size: 14px; }
        .menu-item.active a, .menu-item a:hover { background-color: #2B395B; color: white; }
        
        .btn-logout { color: #EB5757; text-decoration: none; font-size: 14px; padding: 10px 15px; display: inline-block; transition: 0.3s; }
        .btn-logout:hover { color: #c82333; }

        .main-content { flex-grow: 1; padding: 40px; overflow-y: auto; }
        
        /* Seu CSS de conteúdo (Cards, Tabelas, Botões) */
        .header-dashboard { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; }
        .welcome-text h2 { color: #1A233A; font-size: 28px; }
        .welcome-text p { color: #828282; font-size: 14px; }
        .btn-new-register { background-color: #1A233A; color: white; border: none; padding: 12px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; text-decoration: none;}
        
        .cards-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .card { background: white; padding: 25px; border-radius: 10px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #E0E0E0; }
        .card-info h4 { color: #828282; font-size: 12px; font-weight: 500; margin-bottom: 5px; }
        .card-info p { font-size: 32px; font-weight: bold; color: #1A233A; }
        .btn-buy { background: white; border: 1px solid #1A233A; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; text-decoration: none; color: #1A233A;}

        .table-container { background: white; border-radius: 10px; padding: 25px; border: 1px solid #E0E0E0; }
        .table-container h3 { color: #1A233A; margin-bottom: 20px; font-size: 18px; }
        .data-table { width: 100%; border-collapse: collapse; text-align: left; }
        .data-table th { color: #828282; font-size: 12px; font-weight: 500; padding: 12px 10px; border-bottom: 1px solid #E0E0E0; text-transform: uppercase; }
        .data-table td { padding: 16px 10px; font-size: 14px; color: #333; border-bottom: 1px solid #F2F2F2; }
        
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; display: inline-block; }
        .status-badge.concluído { background-color: #E2F0D9; color: #385723; }
        .status-badge.processando { background-color: #FFF2CC; color: #7F6000; }
        .status-badge.gravando { background-color: #FFF2CC; color: #7F6000; } /* ADICIONADO AQUI */
        
        .btn-details { background: white; border: 1px solid #E0E0E0; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .view-all { display: block; text-align: center; color: #828282; text-decoration: none; margin-top: 20px; font-size: 13px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div>
            <div class="logo-area">
                <h1>Veridit</h1>
                <span>EVIDÊNCIAS DIGITAIS</span>
            </div>
            
            <div class="user-card">
                <div class="user-name">{{ usuario.nome if usuario else 'Usuário' }}</div>
                <div class="user-credits">🪙 {{ usuario.creditos if usuario else 0 }} créditos</div>
            </div>

            <ul class="menu-list">
                <li class="menu-item"><a href="/dashboard">📊 Dashboard</a></li>
                <li class="menu-item"><a href="/registros">📜 Registros</a></li> <li class="menu-item"><a href="/comprar-creditos">💳 Comprar Créditos</a></li>
            </ul>
        </div>
        
        <a href="/sair" class="btn-logout">🔕 Sair</a>
    </aside>

    <main class="main-content">
        {% block main_layout %}{% endblock %}
    </main>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // 1. Pega a URL atual do navegador (ex: /comprar-creditos)
            const caminhoAtual = window.location.pathname;
            
            // 2. Pega todos os links do menu lateral
            const linksDoMenu = document.querySelectorAll('.menu-list a');
            
            // 3. Verifica um por um
            linksDoMenu.forEach(link => {
                // Se o link apontar para a URL atual em que estamos
                if (link.getAttribute('href') === caminhoAtual) {
                    // Adiciona a classe 'active' na tag <li> que envolve o link
                    link.parentElement.classList.add('active');
                }
            });
        });
    </script>
</body>
</html>
